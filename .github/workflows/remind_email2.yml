name: Nhắc ghi số nước và tính tiền cuối tháng

on:
  schedule:
    - cron: '0 3 26-31 * *' # 10:00 sáng giờ Việt Nam
  workflow_dispatch:

jobs:
  send_email:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Ho_Chi_Minh

    steps:
      - name: Chỉ chạy vào 3 ngày cuối tháng
        id: guard
        shell: bash
        run: |
          today=$(date +%d)
          last_day=$(date -d "$(date +%Y-%m-01) +1 month -1 day" +%d)
          threshold=$((10#$last_day - 2))

          if [ $((10#$today)) -ge $threshold ]; then
            echo "send=true" >> "$GITHUB_OUTPUT"
          else
            echo "send=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Gửi mail nhắc ghi số nước và tính tiền
        if: github.event_name == 'workflow_dispatch' || steps.guard.outputs.send == 'true'
        shell: bash
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          REMINDER_TO: ${{ secrets.REMINDER_TO }}
        run: |
          python - <<'PY'
          import os, smtplib
          from email.mime.text import MIMEText

          user = os.environ["SMTP_USER"]
          password = os.environ["SMTP_PASS"]
          to_email = os.environ["REMINDER_TO"]

          subject = "Nhắc cuối tháng: ghi số nước và tính tiền"
          body = """3 ngày cuối tháng:
- Liên hệ khách lấy số nước
- Nhập số nước vào website
- Tính tiền tháng mới
- Kiểm tra lại bill trước khi sang tháng mới
"""

          msg = MIMEText(body, "plain", "utf-8")
          msg["Subject"] = subject
          msg["From"] = user
          msg["To"] = to_email

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(user, password)
              server.send_message(msg)
          PY
