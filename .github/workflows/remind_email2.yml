name: Nhắc ghi số nước và tính tiền cuối tháng

on:
  schedule:
    - cron: '0 2 26-31 * *' # 09:00 sáng giờ Việt Nam
  workflow_dispatch:

jobs:
  send_email:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Ho_Chi_Minh
      WEB3FORMS_KEY: "8587548f-533c-48bd-b674-83a927c9f86b"

    steps:
      - name: Kiểm tra có phải 3 ngày cuối tháng không
        id: guard
        shell: bash
        run: |
          today=$(date +%d)
          last_day=$(date -d "$(date +%Y-%m-01) +1 month -1 day" +%d)
          threshold=$((10#$last_day - 2))

          echo "today=$today"
          echo "last_day=$last_day"
          echo "threshold=$threshold"

          if [ $((10#$today)) -ge $threshold ]; then
            echo "send=true" >> "$GITHUB_OUTPUT"
          else
            echo "send=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Gửi email nhắc ghi số nước và tính tiền
        if: github.event_name == 'workflow_dispatch' || steps.guard.outputs.send == 'true'
        shell: bash
        run: |
          curl --fail --silent --show-error -X POST https://api.web3forms.com/submit \
            -H "Content-Type: application/json" \
            -d "{
              \"access_key\": \"$WEB3FORMS_KEY\",
              \"subject\": \"🧾 3 ngày cuối tháng - Nhắc ghi số nước và tính tiền\",
              \"from_name\": \"Nhà trọ Đặng Được\",
              \"message\": \"Nhắc việc cuối tháng: liên hệ khách từng phòng để lấy số nước, nhập dữ liệu vào website, tính tiền tháng mới và đối soát lại bill trước khi bước sang tháng tiếp theo.\"
            }"
