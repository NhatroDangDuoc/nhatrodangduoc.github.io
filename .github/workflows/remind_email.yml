name: Nhắc báo thanh toán tiền trọ

on:
  schedule:
    - cron: '0 3 7,8,10 * *'
  workflow_dispatch:

jobs:
  send_email:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Ho_Chi_Minh

    steps:
      - name: Gửi mail nhắc thu tiền trọ
        shell: bash
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          python - <<'PY'
          import os
          import smtplib
          from email.mime.text import MIMEText

          user = os.environ["SMTP_USER"]
          password = os.environ["SMTP_PASS"]

          recipients = [
              "nguyendangduoc1709@gmail.com",
              "ronz.zrob@gmail.com",
              "thuongdangabc@gmail.com",
          ]

          subject = "Nhắc đầu tháng: báo thanh toán tiền trọ"
          body = (
              "Hôm nay cần:\n"
              "- Kiểm tra các phòng chưa thanh toán\n"
              "- Chủ động báo thanh toán tiền trọ\n"
              "- Đối soát bill và trạng thái đã thu trên website\n"
          )

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(user, password)

              for to_email in recipients:
                  msg = MIMEText(body, "plain", "utf-8")
                  msg["Subject"] = subject
                  msg["From"] = user
                  msg["To"] = to_email
                  server.send_message(msg)
          PY
