name: Nhắc báo thanh toán tiền trọ

on:
  schedule:
    - cron: '0 3 7,8,10 * *' # 10:00 sáng giờ Việt Nam
  workflow_dispatch:

jobs:
  send_email:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Ho_Chi_Minh

    steps:
      - name: Gửi mail nhắc thu tiền trọ
        shell: bash
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          REMINDER_TO: ${{ secrets.REMINDER_TO }}
        run: |
          python - <<'PY'
          import os, smtplib
          from email.mime.text import MIMEText

          user = os.environ["SMTP_USER"]
          password = os.environ["SMTP_PASS"]
          to_email = os.environ["REMINDER_TO"]

          subject = "Nhắc đầu tháng: báo thanh toán tiền trọ"
          body = """Nhắc thu tiền trọ:
- Hôm nay cần kiểm tra các phòng chưa thanh toán
- Chủ động báo thanh toán tiền trọ
- Đối soát bill và trạng thái đã thu trên website
"""

          msg = MIMEText(body, "plain", "utf-8")
          msg["Subject"] = subject
          msg["From"] = user
          msg["To"] = to_email

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(user, password)
              server.send_message(msg)
          PY
