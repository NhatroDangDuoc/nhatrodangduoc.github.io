<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Hệ Thống Quản Trị Nhà Trọ V4.1 (Pro Billing)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>

<style>
/* =========================================================
   CORE UI - TECH-WEAR MINIMALISM
========================================================= */
:root {
  --bg: #F3F4F6; --surface: #FFFFFF; --border: #E5E7EB;
  --text-main: #111827; --text-mute: #6B7280;
  --gold: #D4AF37; --gold-hover: #B8960C; --gold-bg: #FDFBF4;
  --red: #DC2626; --red-bg: #FEF2F2;
  --green: #059669; --green-bg: #ECFDF5;
  --blue: #2563EB; --blue-bg: #EFF6FF;
  --radius: 8px;
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); font-size: 14px; line-height: 1.5; }
.mono { font-family: 'JetBrains Mono', monospace; font-weight: 700; letter-spacing: -0.5px; }

/* AUTH SCREEN */
#auth-screen { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; }
.auth-box { background: var(--surface); padding: 40px; border-radius: 12px; box-shadow: var(--shadow); width: 100%; max-width: 400px; border-top: 4px solid var(--gold); }
.auth-input { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; outline: none; transition: 0.2s; text-align: center; letter-spacing: 2px;}
.auth-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-bg); }
.btn-gold { width: 100%; padding: 12px; background: var(--gold); color: #111; border: none; border-radius: var(--radius); font-weight: 700; cursor: pointer; transition: 0.2s; }
.btn-gold:hover { background: var(--gold-hover); color: #fff; }

/* LAYOUT & HEADER */
#app-container { display: none; min-height: 100vh; flex-direction: column; }
#app-container.ready { display: flex; }
header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; display: flex; align-items: center; padding: 0 24px; justify-content: space-between; height: 64px; }
.logo { font-weight: 700; font-size: 16px; } .logo span { color: var(--gold); }

.nav-tabs { display: flex; gap: 8px; height: 100%; align-items: flex-end; }
.nav-tab { padding: 14px 20px; border: none; background: transparent; color: var(--text-mute); font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.2s; font-size: 14px; font-family: 'Inter', sans-serif; }
.nav-tab:hover { color: var(--text-main); background: var(--bg); }
.nav-tab.active { color: var(--gold-hover); border-bottom-color: var(--gold); background: var(--gold-bg); }

main { flex: 1; padding: 24px; max-width: 1000px; margin: 0 auto; width: 100%; }
.panel { display: none; animation: fadeIn 0.3s ease; }
.panel.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

/* DASHBOARD TOP */
.dash-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
.dash-card { background: var(--surface); padding: 16px; border-radius: var(--radius); border: 1px solid var(--border); text-align: center; }
.dash-card .lbl { font-size: 12px; color: var(--text-mute); text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
.dash-card .val { font-size: 24px; color: var(--gold-hover); }

/* ACCORDION ROOM LIST */
.room-wrap { margin-bottom: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: 0.2s; }
.room-wrap.occupied { border-left: 4px solid var(--gold); }
.room-wrap.vacant { border-left: 4px solid var(--green); }

.r-header { padding: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: var(--surface); }
.r-header:hover { background: #fdfdfd; }
.r-title { font-size: 16px; display: flex; align-items: center; gap: 12px; }
.badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.b-gold { background: var(--gold-bg); color: var(--gold-hover); }
.b-green { background: var(--green-bg); color: var(--green); }

/* CONTENT PANEL */
.r-content { display: none; padding: 0 16px 16px; border-top: 1px dashed var(--border); background: #fafafa; }
.room-wrap.open .r-content { display: block; animation: slideDown 0.3s ease; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

/* FORMS & INLINE UX */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
.form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text-mute); margin-bottom: 6px; text-transform: uppercase; }
.inp { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 14px; }
.inp:focus { border-color: var(--gold); outline: none; }
.inp[readonly] { background: var(--bg); color: var(--text-mute); cursor: not-allowed; }

/* BUTTONS */
.flex-btns { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
.btn { padding: 8px 16px; font-size: 13px; font-weight: 600; border-radius: 6px; cursor: pointer; border: 1px solid transparent; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s;}
.btn-outline { background: var(--surface); border-color: var(--border); color: var(--text-main); }
.btn-gold-sm { background: var(--gold); color: #111; border-color: var(--gold-hover); }
.btn-gold-sm:hover { background: var(--gold-hover); color: #fff;}
.btn-red { background: var(--red-bg); color: var(--red); border-color: var(--red); }
.btn-blue { background: var(--blue-bg); color: var(--blue); border-color: var(--blue); }

.box-calc { background: var(--gold-bg); border: 1px solid var(--gold); padding: 12px; border-radius: 6px; margin-top: 16px; font-size: 13px; }
.box-calc .row { display: flex; justify-content: space-between; margin-bottom: 6px; }
.box-calc .total { font-size: 15px; font-weight: 700; border-top: 1px dashed var(--gold); padding-top: 6px; margin-top: 6px; }

/* TOAST */
#toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; background: #222; color: #fff; border-radius: 8px; font-size: 14px; opacity: 0; transition: 0.3s; z-index: 99999; pointer-events: none; }
#toast.show { opacity: 1; transform: translateY(-10px); }

#bill-render-zone { position: fixed; left: -9999px; top: 0; width: 440px; background: #fff; padding: 24px; color: #111; }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box" id="login-form" style="display:none;">
    <h2 style="text-align:center; font-size:18px; margin-bottom:24px;">🔒 HỆ THỐNG NỘI BỘ</h2>
    <div style="text-align:center; margin-bottom: 16px; font-size: 12px; color: var(--text-mute);">
      Admin: <strong style="color:var(--text-main)">tongtulenhduoc@gmail.com</strong>
    </div>
    <input type="password" id="log-pass" class="auth-input" placeholder="Nhập Mật Khẩu">
    <button class="btn-gold" onclick="doLogin()">TRUY CẬP</button>
    <div id="log-err" style="color:var(--red); font-size:12px; margin-top:10px; text-align:center;"></div>
  </div>
</div>

<div id="app-container">
  <header>
    <div class="logo">🏠  <span>NHÀ TRỌ ĐẶNG ĐƯỢC</span></div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchTab('crm')">📋 Quản Lý Phòng</button>
      <button class="nav-tab" onclick="switchTab('settings')">⚙️ Cài Đặt</button>
    </div>
    <div style="display:flex; gap: 12px; align-items: center;">
      <button class="btn btn-outline" style="padding: 6px 12px;" onclick="doLogout()">Thoát</button>
    </div>
  </header>

  <main>
    <div id="tab-crm" class="panel active">
      <div class="dash-grid">
        <div class="dash-card"><div class="lbl">DOANH THU THÁNG NÀY</div><div class="val mono" id="d-total">0đ</div></div>
        <div class="dash-card"><div class="lbl">CHƯA XIN SỐ NƯỚC</div><div class="val mono" id="d-water">0</div></div>
        <div class="dash-card"><div class="lbl">ĐANG NỢ TIỀN</div><div class="val mono" style="color:var(--red);" id="d-debt">0</div></div>
      </div>

      <div style="display:flex; justify-content:space-between; margin-bottom:16px;">
        <h2 style="font-size: 16px;">Sơ đồ 9 Phòng</h2>
        <button class="btn btn-outline" onclick="loadData()">🔄 Refresh</button>
      </div>

      <div id="room-list"></div>
    </div>

    <div id="tab-settings" class="panel">
      
      <div style="background:var(--surface); padding:24px; border-radius:var(--radius); border:1px solid var(--border); margin-bottom: 24px;">
        <h2 style="font-size: 16px; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px;">📊 Cài Đặt Giá Cố Định (Global Settings)</h2>
        <div class="form-grid" style="margin-bottom: 16px;">
          <div class="form-group"><label>Giá Nước Nóng (đ/m³)</label><input type="number" class="inp" id="cfg-water-hot" placeholder="20000"></div>
          <div class="form-group"><label>Giá Nước Lạnh (đ/m³)</label><input type="number" class="inp" id="cfg-water-cold" placeholder="15000"></div>
          <div class="form-group"><label>Phí Wifi/Tháng (đ)</label><input type="number" class="inp" id="cfg-wifi" placeholder="60000"></div>
        </div>
        <button class="btn btn-gold-sm" onclick="saveGlobalSettings()">💾 LƯU BẢNG GIÁ CHUNG</button>
      </div>

      <div style="background:var(--surface); padding:24px; border-radius:var(--radius); border:1px solid var(--border);">
        <h2 style="font-size: 16px; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px;">🏦 Cấu Hình VietQR (In Hóa Đơn)</h2>
        <div class="form-grid" style="margin-bottom: 16px;">
          <div class="form-group"><label>Mã Ngân Hàng (VD: MB, VCB...)</label><input type="text" class="inp" id="cfg-bank"></div>
          <div class="form-group"><label>Số Tài Khoản</label><input type="text" class="inp" id="cfg-acc"></div>
          <div class="form-group"><label>Tên Chủ TK (Viết hoa không dấu)</label><input type="text" class="inp" id="cfg-name"></div>
        </div>
        <button class="btn btn-gold-sm" onclick="saveBankConfig()">💾 LƯU CẤU HÌNH NGÂN HÀNG</button>
      </div>
    </div>
  </main>
</div>

<div id="bill-render-zone"></div>
<div id="toast"></div>

<textarea id="clip-zone" style="position:absolute; left:-9999px;"></textarea>

<script>
/* =========================================================
   HARDCODE CẤU HÌNH BẢO MẬT
========================================================= */
const SB_URL = 'https://pmrnmvsgdumbsztsiskf.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtcm5tdnNnZHVtYnN6dHNpc2tmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNjk4NTIsImV4cCI6MjA5MDY0NTg1Mn0.vf-QWR0EGGGCIhRikSzpwNbJdLNlkuoecEN9I82mbWk';
const ADMIN_EMAIL = 'tongtulenhduoc@gmail.com';

const sb = window.supabase.createClient(SB_URL, SB_ANON);
let APP_DATA = { rooms: [], tenants: [], bills: [] };

// NEW: GLOBAL SETTINGS STATE
let GLOBAL_CFG = { water_hot: 20000, water_cold: 15000, wifi: 60000 };

/* =========================================================
   BOOT & BẢO MẬT
========================================================= */
window.onload = async () => {
  // Load thông tin Ngân hàng
  document.getElementById('cfg-bank').value = localStorage.getItem('bank_id') || '';
  document.getElementById('cfg-acc').value = localStorage.getItem('bank_acc') || '';
  document.getElementById('cfg-name').value = localStorage.getItem('bank_name') || '';

  // NEW: Load Global Settings
  GLOBAL_CFG.water_hot = Number(localStorage.getItem('cfg_water_hot')) || 20000;
  GLOBAL_CFG.water_cold = Number(localStorage.getItem('cfg_water_cold')) || 15000;
  GLOBAL_CFG.wifi = Number(localStorage.getItem('cfg_wifi')) || 60000;
  
  document.getElementById('cfg-water-hot').value = GLOBAL_CFG.water_hot;
  document.getElementById('cfg-water-cold').value = GLOBAL_CFG.water_cold;
  document.getElementById('cfg-wifi').value = GLOBAL_CFG.wifi;

  // Kiểm tra phiên đăng nhập
  const { data: { session } } = await sb.auth.getSession();
  if(session) { enterApp(); } 
  else { document.getElementById('login-form').style.display = 'block'; }

  document.getElementById('log-pass').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') doLogin();
  });
};

async function doLogin() {
  const pass = document.getElementById('log-pass').value;
  if (!pass) return;
  document.getElementById('log-err').innerText = 'Đang xử lý...';
  
  const { error } = await sb.auth.signInWithPassword({ email: ADMIN_EMAIL, password: pass });
  if(error) document.getElementById('log-err').innerText = 'Mật khẩu không chính xác!';
  else enterApp();
}

async function doLogout() { await sb.auth.signOut(); window.location.reload(); }

function enterApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-container').classList.add('ready');
  loadData();
}

// NEW: SAVE GLOBAL SETTINGS FUNCTION
function saveGlobalSettings() {
  localStorage.setItem('cfg_water_hot', document.getElementById('cfg-water-hot').value.trim());
  localStorage.setItem('cfg_water_cold', document.getElementById('cfg-water-cold').value.trim());
  localStorage.setItem('cfg_wifi', document.getElementById('cfg-wifi').value.trim());
  
  // Update state immediately
  GLOBAL_CFG.water_hot = Number(document.getElementById('cfg-water-hot').value);
  GLOBAL_CFG.water_cold = Number(document.getElementById('cfg-water-cold').value);
  GLOBAL_CFG.wifi = Number(document.getElementById('cfg-wifi').value);
  
  toast('✅ Đã lưu Cài Đặt Bảng Giá Chung!');
  loadData(); // Rerender if prices change
}

function saveBankConfig() {
  localStorage.setItem('bank_id', document.getElementById('cfg-bank').value.trim());
  localStorage.setItem('bank_acc', document.getElementById('cfg-acc').value.trim());
  localStorage.setItem('bank_name', document.getElementById('cfg-name').value.trim());
  toast('✅ Đã lưu cấu hình Ngân Hàng!');
}

function toast(msg) {
  const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function switchTab(tabId) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tabId).classList.add('active');
  event.currentTarget.classList.add('active');
}

/* =========================================================
   TẢI VÀ RENDER DỮ LIỆU
========================================================= */
async function loadData() {
  toast("⏳ Đang đồng bộ CSDL...");
  const currMonth = new Date().getMonth() + 1;
  const currYear = new Date().getFullYear();

  const [resR, resT, resB] = await Promise.all([
    sb.from('rooms').select('*').order('id', {ascending: true}),
    sb.from('tenants').select('*'),
    sb.from('billing').select('*').eq('month', currMonth).eq('year', currYear)
  ]);

  APP_DATA.rooms = resR.data || [];
  APP_DATA.tenants = resT.data || [];
  APP_DATA.bills = resB.data || [];

  updateDashboard();
  renderRooms();
}

function updateDashboard() {
  let total = 0, debt = 0, noWater = 0;
  APP_DATA.rooms.forEach(r => {
    if(r.status === 'occupied') {
      const b = APP_DATA.bills.find(x => x.room_id === r.id);
      if(!b) { noWater++; debt++; }
      else {
        // Cập nhật logic Check Nước: Chỉ cần chưa nhập Nước nóng HOẶC lạnh là tính chưa xin
        if((!b.water_hot_curr && !b.water_cold_curr) && !b.water_debt) noWater++;
        if(!b.is_paid) debt++; else total += Number(b.total_amount);
      }
    }
  });
  document.getElementById('d-total').innerText = fmt(total);
  document.getElementById('d-water').innerText = noWater;
  document.getElementById('d-debt').innerText = debt;
}

function toggleAcc(id) {
  const w = document.getElementById('rw-'+id);
  w.classList.toggle('open');
}

/* =========================================================
   CORE UI RENDER (Inline Accordion)
========================================================= */
function renderRooms() {
  const html = APP_DATA.rooms.map(r => {
    const t = APP_DATA.tenants.find(x => x.room_id === r.id);
    const isOcc = r.status === 'occupied' && t;
    
    return `
    <div class="room-wrap ${isOcc ? 'occupied' : 'vacant'}" id="rw-${r.id}">
      <div class="r-header" onclick="toggleAcc(${r.id})">
        <div class="r-title mono">${r.num} <span class="badge ${isOcc?'b-gold':'b-green'}" style="margin-left:8px">${isOcc? t.name : 'TRỐNG'}</span></div>
        <div style="font-size:13px; color:var(--text-mute)">${isOcc ? `Giá: ${fmt(r.price_rent)}/th` : 'Bấm để thêm khách ▼'}</div>
      </div>
      <div class="r-content">
        ${isOcc ? renderOccupiedFlow(r, t) : renderVacantFlow(r)}
      </div>
    </div>`;
  }).join('');
  document.getElementById('room-list').innerHTML = html;
}

function fmt(num) { return new Intl.NumberFormat('vi-VN').format(num || 0) + 'đ'; }

/* =========================================================
   FLOW 1: KHÁCH MỚI VÀO (NEW: Thêm Checkbox Wifi + Nước Lạnh)
========================================================= */
function renderVacantFlow(r) {
  const today = new Date().toISOString().split('T')[0];
  return `
    <div style="padding: 12px; background: #fff; border-radius: 6px; border: 1px solid var(--border); margin-top:8px;">
      <h3 style="font-size:14px; margin-bottom:12px; border-bottom:1px solid var(--border); padding-bottom:8px;">➕ Nhập Khách Mới</h3>
      <div class="form-grid">
        <div class="form-group"><label>Họ Tên</label><input type="text" class="inp" id="in-name-${r.id}"></div>
        <div class="form-group"><label>SĐT Zalo</label><input type="text" class="inp" id="in-phone-${r.id}"></div>
        <div class="form-group"><label>Danh xưng</label>
          <select class="inp" id="in-pro-${r.id}"><option>Anh</option><option>Chị</option><option>Chú</option><option>Cô</option><option>Em</option></select>
        </div>
        <div class="form-group"><label>Ngày vào ở</label><input type="date" class="inp" id="in-date-${r.id}" value="${today}" onchange="calcCheckin(${r.id}, ${r.price_rent})"></div>
        <div class="form-group"><label>Tiền cọc (đ)</label><input type="number" class="inp" id="in-dep-${r.id}" value="${r.price_rent}" oninput="calcCheckin(${r.id}, ${r.price_rent})"></div>
        
        <div class="form-group"><label>Có dùng Wifi không?</label>
          <select class="inp" id="in-wifi-${r.id}"><option value="1">✅ Có</option><option value="0">❌ Không</option></select>
        </div>
        <div class="form-group"><label>Số Nước NÓNG (đầu)</label><input type="number" class="inp" id="in-water-hot-${r.id}" value="0"></div>
        <div class="form-group"><label>Số Nước LẠNH (đầu)</label><input type="number" class="inp" id="in-water-cold-${r.id}" value="0"></div>
      </div>
      
      <div class="box-calc" id="calc-in-${r.id}">
        <div class="row"><span>Tiền cọc:</span> <span class="mono" id="c-dep-${r.id}">${fmt(r.price_rent)}</span></div>
        <div class="row"><span>Tiền phòng (chia tỉ lệ):</span> <span class="mono" id="c-rent-${r.id}">0đ</span></div>
        <div class="total row"><span>👉 KHÁCH CẦN ĐÓNG NGAY:</span> <span class="mono" id="c-total-${r.id}">0đ</span></div>
      </div>
      <div class="flex-btns">
        <button class="btn btn-gold-sm" onclick="saveNewTenant(${r.id})">💾 LƯU KHÁCH & VÀO Ở</button>
      </div>
    </div>`;
}

function calcCheckin(rid, price) {
  const dStr = document.getElementById(`in-date-${rid}`).value;
  const dep = Number(document.getElementById(`in-dep-${rid}`).value) || 0;
  if(!dStr) return;
  const d = new Date(dStr);
  const daysInMonth = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
  const remainDays = daysInMonth - d.getDate() + 1; 
  
  let rent = 0;
  if(d.getDate() > 1) rent = Math.round((price / daysInMonth) * remainDays);
  
  document.getElementById(`c-dep-${rid}`).innerText = fmt(dep);
  document.getElementById(`c-rent-${rid}`).innerText = fmt(rent) + ` (${remainDays} ngày)`;
  document.getElementById(`c-total-${rid}`).innerText = fmt(dep + rent);
}

async function saveNewTenant(rid) {
  const name = document.getElementById(`in-name-${rid}`).value;
  const phone = document.getElementById(`in-phone-${rid}`).value;
  const pro = document.getElementById(`in-pro-${rid}`).value;
  const ci = document.getElementById(`in-date-${rid}`).value;
  const dep = document.getElementById(`in-dep-${rid}`).value;
  
  const hasWifi = document.getElementById(`in-wifi-${rid}`).value === '1';
  const waterHot = document.getElementById(`in-water-hot-${rid}`).value;
  const waterCold = document.getElementById(`in-water-cold-${rid}`).value;
  
  if(!name || !phone) { toast('❌ Điền đủ Tên và SĐT'); return; }
  
  toast('⏳ Đang xử lý...');
  await sb.from('tenants').insert({ room_id: rid, name: name, zalo_phone: phone, pronoun: pro, move_in_date: ci, deposit_amount: dep });
  
  // Cập nhật trạng thái phòng và cờ Wifi
  await sb.from('rooms').update({ status: 'occupied', has_wifi: hasWifi }).eq('id', rid);
  
  // Lưu số nước đầu vào billing tháng hiện tại
  const cm = new Date().getMonth()+1, cy = new Date().getFullYear();
  await sb.from('billing').insert({ 
    room_id: rid, month: cm, year: cy, 
    water_hot_prev: waterHot, water_cold_prev: waterCold 
  });
  
  toast('✅ Đã thêm khách mới!'); loadData();
}

/* =========================================================
   FLOW 2 & 3: ĐANG Ở -> TÍNH BILL (NEW: Logic Nước Tách)
========================================================= */
function renderOccupiedFlow(r, t) {
  const currMonth = new Date().getMonth() + 1;
  // Backward compatibility: Bắt fallback data nước cũ nếu cột mới bị rỗng
  const b = APP_DATA.bills.find(x => x.room_id === r.id) || {};
  const hotPrev = b.water_hot_prev || b.water_prev || 0; 
  const hotCurr = b.water_hot_curr || 0;
  const coldPrev = b.water_cold_prev || 0;
  const coldCurr = b.water_cold_curr || 0;
  const elecAmount = b.electricity_amount || 0;
  const extraFee = b.extra_fee || 0;

  return `
    <div style="background:#fff; padding:16px; border-radius:6px; border:1px solid var(--border); margin-top:12px;">
      <div style="display:flex; justify-content:space-between; margin-bottom:12px; flex-wrap: wrap; gap: 8px;">
        <div style="font-size:13px;">📞 <strong>${t.zalo_phone}</strong> | Vào: ${t.move_in_date} | Wifi: ${r.has_wifi ? '✅' : '❌'}</div>
        <button class="btn btn-blue" onclick="copyZalo('${t.pronoun}', '${t.zalo_phone}')">💬 Zalo Xin Số</button>
      </div>

      <h3 style="font-size:14px; margin: 16px 0 12px; border-bottom:1px solid var(--border); padding-bottom:8px; color:var(--gold-hover);">💰 CHỐT BILL THÁNG ${currMonth}</h3>
      <div class="form-grid">
        <div class="form-group"><label>Số Nước NÓNG Cũ</label><input type="number" class="inp" id="b-who-${r.id}" value="${hotPrev}" readonly></div>
        <div class="form-group"><label>Số Nước NÓNG Mới</label><input type="number" class="inp" id="b-whn-${r.id}" value="${hotCurr}" oninput="calcBill(${r.id}, ${r.price_rent}, ${r.has_wifi})"></div>
        
        <div class="form-group"><label>Số Nước LẠNH Cũ</label><input type="number" class="inp" id="b-wco-${r.id}" value="${coldPrev}" readonly></div>
        <div class="form-group"><label>Số Nước LẠNH Mới</label><input type="number" class="inp" id="b-wcn-${r.id}" value="${coldCurr}" oninput="calcBill(${r.id}, ${r.price_rent}, ${r.has_wifi})"></div>
        
        <div class="form-group"><label>Tổng Tiền Điện (EVN)</label><input type="number" class="inp" id="b-elec-${r.id}" value="${elecAmount}" oninput="calcBill(${r.id}, ${r.price_rent}, ${r.has_wifi})"></div>
        <div class="form-group"><label>Upload Bill EVN (Cloud)</label><input type="file" class="inp" id="b-file-${r.id}" accept="image/*"></div>
        
        <div class="form-group"><label>Rác / Phụ Phí</label><input type="number" class="inp" id="b-ex-${r.id}" value="${extraFee}" oninput="calcBill(${r.id}, ${r.price_rent}, ${r.has_wifi})"></div>
        <div class="form-group"><label>Ghi chú Bill</label><input type="text" class="inp" id="b-note-${r.id}"></div>
      </div>
      
      <div class="box-calc">
        <div class="row"><span>Tiền phòng:</span> <span class="mono">${fmt(r.price_rent)}</span></div>
        <div class="row"><span>Nước Nóng (x${fmt(GLOBAL_CFG.water_hot)}):</span> <span class="mono" id="bc-hwa-${r.id}">0đ</span></div>
        <div class="row"><span>Nước Lạnh (x${fmt(GLOBAL_CFG.water_cold)}):</span> <span class="mono" id="bc-cwa-${r.id}">0đ</span></div>
        ${r.has_wifi ? `<div class="row"><span>Phí Wifi:</span> <span class="mono">${fmt(GLOBAL_CFG.wifi)}</span></div>` : ''}
        <div class="total row"><span>👉 TỔNG BILL CẦN THU:</span> <span class="mono" id="bc-tot-${r.id}" style="color:var(--red); font-size:18px;">0đ</span></div>
      </div>

      <div class="flex-btns" style="border-bottom: 1px dashed var(--border); padding-bottom: 16px; margin-bottom:16px;">
        <button class="btn btn-gold-sm" onclick="saveAndGenBill(${r.id}, ${r.price_rent}, '${t.name}', ${r.has_wifi})">💾 LƯU & XUẤT ẢNH BILL</button>
        <button class="btn btn-outline" onclick="markPaid(${r.id})">✅ Đánh dấu ĐÃ THU TIỀN</button>
      </div>

      <h3 style="font-size:14px; margin-bottom:8px; color:var(--text-mute);">🚪 KHÁCH RỜI ĐI GIỮA CHỪNG</h3>
      <button class="btn btn-red" onclick="showCheckout(${r.id})">Thực hiện trả phòng</button>
      <div id="co-zone-${r.id}" style="display:none; margin-top:12px; background:var(--red-bg); padding:12px; border-radius:6px; border:1px solid var(--red);">
         <button class="btn btn-outline" style="border-color:var(--red); color:var(--red);" onclick="execCheckout(${r.id})">XÁC NHẬN TRẢ PHÒNG & XÓA DATA</button>
      </div>
    </div>`;
}

// NEW: CALCULATION SYSTEM
function calcBill(rid, price, hasWifi) {
  const who = Number(document.getElementById(`b-who-${rid}`).value)||0;
  const whn = Number(document.getElementById(`b-whn-${rid}`).value)||0;
  const wco = Number(document.getElementById(`b-wco-${rid}`).value)||0;
  const wcn = Number(document.getElementById(`b-wcn-${rid}`).value)||0;
  
  const elec = Number(document.getElementById(`b-elec-${rid}`).value)||0;
  const ex = Number(document.getElementById(`b-ex-${rid}`).value)||0;
  const wifiFee = hasWifi ? GLOBAL_CFG.wifi : 0;
  
  let hotFee = 0, coldFee = 0;
  if(whn > who) hotFee = (whn - who) * GLOBAL_CFG.water_hot;
  if(wcn > wco) coldFee = (wcn - wco) * GLOBAL_CFG.water_cold;
  
  document.getElementById(`bc-hwa-${rid}`).innerText = fmt(hotFee);
  document.getElementById(`bc-cwa-${rid}`).innerText = fmt(coldFee);
  
  const total = price + hotFee + coldFee + elec + wifiFee + ex;
  document.getElementById(`bc-tot-${rid}`).innerText = fmt(total);
  
  return { hf: hotFee, cf: coldFee, hu: whn-who, cu: wcn-wco, tot: total, elec: elec, ex: ex, wifi: wifiFee, whn: whn, wcn: wcn };
}

async function saveAndGenBill(rid, price, tname, hasWifi) {
  const bk = localStorage.getItem('bank_id');
  if(!bk) { toast('❌ Cần nhập cấu hình Ngân hàng ở mục Cài Đặt trước!'); return; }

  const calc = calcBill(rid, price, hasWifi);
  const fileInp = document.getElementById(`b-file-${rid}`);
  
  toast('⏳ Đang lưu & Upload file...');
  let evnUrl = '';
  if(fileInp.files.length > 0) {
    const file = fileInp.files[0];
    const path = `evn/${Date.now()}_${file.name}`;
    const { error } = await sb.storage.from('nhatro-docs').upload(path, file);
    if(!error) evnUrl = sb.storage.from('nhatro-docs').getPublicUrl(path).data.publicUrl;
  }

  const cm = new Date().getMonth()+1, cy = new Date().getFullYear();
  
  const payload = { 
    water_hot_curr: calc.whn, 
    water_cold_curr: calc.wcn, 
    electricity_amount: calc.elec,
    extra_fee: calc.ex,
    wifi_fee: calc.wifi,
    total_amount: calc.tot, 
    evn_bill_url: evnUrl, 
    is_sent: true 
  };

  const { data: exist } = await sb.from('billing').select('id').eq('room_id', rid).eq('month', cm).eq('year', cy).single();
  if(exist) {
    await sb.from('billing').update(payload).eq('id', exist.id);
  } else {
    // Nếu chưa tồn tại bản nháp tháng này, lấy dữ liệu nước từ field DOM
    payload.water_hot_prev = Number(document.getElementById(`b-who-${rid}`).value)||0;
    payload.water_cold_prev = Number(document.getElementById(`b-wco-${rid}`).value)||0;
    await sb.from('billing').insert({ room_id: rid, month: cm, year: cy, ...payload });
  }

  toast('📸 Đang tạo ảnh Bill...');
  const bacc = localStorage.getItem('bank_acc'), bname = localStorage.getItem('bank_name');
  const qr = `https://img.vietqr.io/image/${bk}-${bacc}-compact.png?amount=${calc.tot}&addInfo=Phong ${rid}&accountName=${encodeURIComponent(bname)}`;
  
  // NEW: UPDATE BILL IMAGE OUTPUT
  const z = document.getElementById('bill-render-zone');
  z.innerHTML = `
    <div style="border-bottom:3px solid var(--gold); padding-bottom:12px; margin-bottom:16px;">
      <h2 style="color:var(--gold-hover); margin:0;">HÓA ĐƠN THÁNG ${cm}/${cy}</h2>
      <p style="font-size:12px; color:#666;">Khách: ${tname}</p>
    </div>
    <div style="font-size:15px; margin-bottom:8px; display:flex; justify-content:space-between;"><span>Tiền phòng:</span> <strong>${fmt(price)}</strong></div>
    <div style="font-size:15px; margin-bottom:8px; display:flex; justify-content:space-between;"><span>Điện EVN:</span> <strong>${fmt(calc.elec)}</strong></div>
    <div style="font-size:15px; margin-bottom:8px; display:flex; justify-content:space-between;"><span>Nước Nóng (${calc.hu}m³):</span> <strong>${fmt(calc.hf)}</strong></div>
    <div style="font-size:15px; margin-bottom:8px; display:flex; justify-content:space-between;"><span>Nước Lạnh (${calc.cu}m³):</span> <strong>${fmt(calc.cf)}</strong></div>
    ${hasWifi ? `<div style="font-size:15px; margin-bottom:8px; display:flex; justify-content:space-between;"><span>Phí Wifi:</span> <strong>${fmt(calc.wifi)}</strong></div>` : ''}
    <div style="font-size:15px; margin-bottom:16px; display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding-bottom:8px;"><span>Rác/Khác:</span> <strong>${fmt(calc.ex)}</strong></div>
    <div style="font-size:20px; color:var(--red); font-weight:700; text-align:right; margin-bottom:16px;">TỔNG: ${fmt(calc.tot)}</div>
    ${evnUrl ? `<img src="${evnUrl}" style="width:100%; max-height:200px; object-fit:contain; border:1px solid #ccc; margin-bottom:16px;">` : ''}
    <div style="text-align:center;"><img src="${qr}" crossorigin="anonymous" style="width:200px;"><p style="font-size:12px; margin-top:4px;">Quét để thanh toán</p></div>
  `;
  
  setTimeout(async () => {
    const canvas = await html2canvas(z, { scale: 3, useCORS: true, backgroundColor: '#ffffff' });
    const a = document.createElement('a'); a.download = `Bill_P${rid}_T${cm}.png`;
    a.href = canvas.toDataURL('image/png'); a.click();
    loadData();
  }, 1200);
}

async function markPaid(rid) {
  const cm = new Date().getMonth()+1, cy = new Date().getFullYear();
  await sb.from('billing').update({ is_paid: true }).eq('room_id', rid).eq('month', cm).eq('year', cy);
  toast('✅ Đã lưu trạng thái thanh toán!'); loadData();
}

/* =========================================================
   ZALO & CHECKOUT
========================================================= */
function copyZalo(pro, phone) {
  const txt = document.getElementById('clip-zone');
  txt.value = `${pro} ơi nay rảnh chụp em xin số nước nha!`; 
  txt.select(); document.execCommand('copy');
  toast('📋 Đã copy tin nhắn!');
  setTimeout(() => { window.open(`https://zalo.me/${phone}`, '_blank'); }, 500);
}

function showCheckout(rid) { document.getElementById(`co-zone-${rid}`).style.display = 'block'; }

async function execCheckout(rid) {
  if(!confirm("⚠️ Chắc chắn trả phòng? Toàn bộ dữ liệu khách này sẽ bị xóa!")) return;
  toast('⏳ Đang dọn dẹp data...');
  await sb.from('tenants').delete().eq('room_id', rid);
  await sb.from('rooms').update({ status: 'TRỐNG', has_wifi: false }).eq('id', rid);
  toast('🚪 Đã trả phòng!'); loadData();
}
</script>
